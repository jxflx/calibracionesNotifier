name: Calibraciones Diarias

on:
  schedule:
    # Corre a las 13:00 UTC (Aprox 7:00 AM o 8:00 AM en México dependiendo del horario)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite ejecución manual desde la web de GitHub

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permite al bot hacer push de la DB actualizada

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar motor de notificaciones
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DESTINATION_EMAIL: ${{ secrets.DESTINATION_EMAIL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: python main.py

      - name: Persistir cambios en Base de Datos
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add calibraciones.db
          # Solo hace commit si hubo cambios en la base de datos
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update database flags" && git push)
